# docker-compose.coolify.yml
#
# Template para Coolify. Una instancia = un agente (un Resource en Coolify).
# Para N agentes, crea N Resources distintos, todos apuntando a este compose
# pero con AGENT_ID, TELEGRAM_BOT_TOKEN y TELEGRAM_CHAT_ID propios.
#
# IMPORTANTE — disenio:
#   * Coolify aisla volumes y containers por Resource automaticamente. NO uses
#     interpolacion `${AGENT_ID}` en nombres de volume / container_name —
#     Coolify lo rechaza durante validacion ("forbidden character").
#   * Coolify NO interpola en YAML keys (solo en valores). Por eso pasamos
#     TELEGRAM_BOT_TOKEN con nombre fijo y el entrypoint.sh lo re-exporta
#     como TELEGRAM_BOT_TOKEN_<UPPER(AGENT_ID)> antes del compile.

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Identidad del agente (REQUERIDO en Resource env vars).
      AGENT_ID: ${AGENT_ID}
      FLEET_REF: ${FLEET_REF:-main}
      FLEET_REPO_URL: ${FLEET_REPO_URL:-https://github.com/Nikoxx99/openclaw-fleet-config.git}

      # Forzar bind LAN para que Coolify enrute el gateway desde el host.
      OPENCLAW_GATEWAY_BIND: lan

      # Per-agent (Resource env vars en Coolify): cada participante setea las suyas.
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # Globales por ahora (Project env vars). Si querés override por agente,
      # setear la misma var en el Resource — Coolify Resource > Project.
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}

      # Per-agent (resource-level env vars en Coolify). Nombres FIJOS aqui;
      # el entrypoint los re-exporta como ${TELEGRAM_BOT_TOKEN_AGENT01} etc.
      # antes de invocar compile.py.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}

    volumes:
      - openclaw_data:/home/node/.openclaw/workspace
      - openclaw_logs:/var/log/agente

    ports:
      - "${HOST_PORT:-0}:18789"

    healthcheck:
      test: ["CMD", "/usr/local/bin/fleet-healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  openclaw_data:
  openclaw_logs:
