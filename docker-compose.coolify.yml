# docker-compose.coolify.yml
#
# Template para Coolify. Una instancia = un agente. Para N agentes, crea N
# Resources en Coolify, todos apuntando a este compose con AGENT_ID distinto.
#
# Build se hace en Coolify desde este repo (no GHCR propio). El FROM extiende
# `ghcr.io/openclaw/openclaw:latest` que ya existe en el registry — la layer
# se cachea, builds incrementales son rapidos (~30s).

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-${AGENT_ID}
    restart: unless-stopped
    environment:
      # Identidad del agente (REQUERIDO).
      AGENT_ID: ${AGENT_ID}
      FLEET_REF: ${FLEET_REF:-main}
      FLEET_REPO_URL: ${FLEET_REPO_URL:-https://github.com/Nikoxx99/openclaw-fleet-config.git}

      # Forzar bind LAN para que Coolify enrute el gateway desde el host.
      OPENCLAW_GATEWAY_BIND: lan

      # Compartidos por todos los agentes (proyecto-level en Coolify).
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}

      # Per-agent (resource-level). Convencion: TELEGRAM_BOT_TOKEN_<UPPER>.
      # El YAML referencia ${TELEGRAM_BOT_TOKEN_ALICE}, etc.
      TELEGRAM_BOT_TOKEN_${AGENT_ID_UPPER}: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID_${AGENT_ID_UPPER}: ${TELEGRAM_CHAT_ID}

    volumes:
      # Workspace persistente.
      - openclaw_data_${AGENT_ID}:/home/node/.openclaw/workspace
      # Logs persistentes (crash-recovery los lee al boot).
      - openclaw_logs_${AGENT_ID}:/var/log/agente

    ports:
      # 18789 es el puerto del gateway OpenClaw (no 8080).
      - "${HOST_PORT:-0}:18789"

    healthcheck:
      test: ["CMD", "/usr/local/bin/fleet-healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    labels:
      coolify.managed: "true"
      coolify.name: "openclaw-${AGENT_ID}"

volumes:
  openclaw_data_${AGENT_ID}:
  openclaw_logs_${AGENT_ID}:
