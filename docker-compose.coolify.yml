# docker-compose.coolify.yml
#
# 1 service de prueba — agent01. Lo demas (agent02..04) lo agregamos cuando
# este flujo pase QA con la imagen oficial Coolify-friendly.
#
# Imagen base: coollabsio/openclaw:latest (DockerHub)
#   - corre nginx (8080) → openclaw gateway (18789) con basic auth opcional
#   - state: /data/.openclaw, workspace: /data/workspace
#   - soporta hook OPENCLAW_DOCKER_INIT_SCRIPT para correr compile.py
#     antes de que configure.js + nginx + gateway arranquen
#   - exige OPENCLAW_GATEWAY_TOKEN y al menos un proveedor LLM seteado
#
# Convenciones de env vars:
#   - Globales (sin sufijo): viven en Coolify Project env, compartidas.
#   - Per-agent (con sufijo _AGENT01): viven en el Resource env. El compose
#     las re-expone con el nombre standard (sin sufijo) para que SDKs/skills
#     no necesiten saber que son "del agente N".
#
# Volumes: Coolify aisla todo el stack; el volume `agent01_data` solo es
# accesible por agent01. Persiste /data (state + workspace + tools cache).

services:
  agent01:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # ── Fleet config ────────────────────────────────────────────────────
      AGENT_ID: agent01
      FLEET_REF: ${FLEET_REF:-main}
      FLEET_REPO_URL: ${FLEET_REPO_URL:-https://github.com/Nikoxx99/openclaw-fleet-config.git}
      # Hook que la imagen base llama antes de configure.js. Aqui es donde
      # corremos compile.py y materializamos skills/hooks privados.
      OPENCLAW_DOCKER_INIT_SCRIPT: /opt/fleet-init.sh

      # ── Gateway oficial (requeridas por la imagen base) ─────────────────
      # OPENCLAW_GATEWAY_TOKEN: requerida — bearer token para auth interna.
      #   Coolify la inyecta desde Project env (mismo token para todos los
      #   agentes esta bien — cada uno corre en su propio container).
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PORT: 18789
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_STATE_DIR: /data/.openclaw
      OPENCLAW_WORKSPACE_DIR: /data/workspace
      # Custom config mount path — donde compile.py escribe el openclaw.json
      # base. configure.js del entrypoint oficial lo lee y luego layer-merge
      # con env vars (cascade: env > custom JSON > persisted).
      OPENCLAW_CUSTOM_CONFIG: /app/config/openclaw.json
      # Bundled skills dir — donde el entrypoint copia las skills privadas.
      OPENCLAW_BUNDLED_SKILLS_DIR: /data/.openclaw/skills

      # ── Runtime tuning ─────────────────────────────────────────────────
      # 2GiB heap — match con deployment.resources.memory de base.yaml.
      # Sin esto V8 corta ~1.4GiB y con 69 plugins cargados explotamos.
      NODE_OPTIONS: --max-old-space-size=2048
      # Mas threads en libuv para acelerar reads paralelos al boot.
      UV_THREADPOOL_SIZE: 16
      # Forzar polling en chokidar — evitamos EMFILE: too many open files
      # del inotify watch limit (no podemos subir fs.inotify.max_user_watches
      # en infra shared de Coolify). Trade-off: stat-loop cada 5s en lugar
      # de eventos kernel, pero los skills/hooks/config solo cambian en
      # redeploy asi que el costo de CPU es despreciable.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "5000"

      # ── Browser sidecar (replica el compose oficial coollabsio/openclaw) ──
      # CDP (Chrome DevTools Protocol) en el sidecar `browser`. nginx del base
      # proxea ademas /browser/ a http://browser:3000/ (VNC web UI).
      BROWSER_CDP_URL: http://browser:9223
      BROWSER_DEFAULT_PROFILE: openclaw
      BROWSER_EVALUATE_ENABLED: "true"

      # ── Auth nginx (opcional pero recomendado para exposicion publica) ──
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD}

      # ── Per-agent secrets (Coolify Resource env) ────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY_AGENT01}
      GEMINI_API_KEY: ${GEMINI_API_KEY_AGENT01}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_AGENT01}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID_AGENT01}

      # ── Globales (Coolify Project env) ──────────────────────────────────
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}

    volumes:
      # Volume unico — persiste /data (state, workspace, tools cache).
      # La imagen base ya monta /data por convencion; un solo volume cubre:
      #   /data/.openclaw     → state (config, gateway.token, credentials)
      #   /data/workspace     → user projects
      #   /data/npm-global    → npm install cache
      #   /data/uv            → uv tools cache
      #   /data/go            → go workspace
      #   /data/linuxbrew     → brew install cache
      - agent01_data:/data
      - agent01_logs:/var/log/agente

    depends_on:
      # nginx del base resuelve el upstream `browser` al startup; el harness
      # ademas usa BROWSER_CDP_URL para la CDP. Sin este service el container
      # no arranca (host not found).
      - browser

    ports:
      # 8080 = nginx (publico via Coolify, con basic auth si AUTH_PASSWORD esta).
      # 18789 NO se expone — solo accesible internamente via nginx.
      - "${PORT_AGENT01:-0}:8080"

    healthcheck:
      # /healthz lo expone nginx del base sin pasar por basic auth, asi que
      # Coolify (y cualquier load balancer externo) puede chequearlo sin token.
      test: ["CMD", "curl", "-fsS", "--max-time", "5", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Browser sidecar — replica el patron del docker-compose oficial de
  # coollabsio/openclaw. Provee:
  #   - CDP en :9223 (consumido por el harness via BROWSER_CDP_URL)
  #   - VNC web UI en :3000 (proxy via nginx en /browser/)
  # No publicamos puertos al host: todo se accede a traves del nginx del
  # service `agent01` (basic auth opcional), que ya tiene la location /browser/.
  browser:
    image: coollabsio/openclaw-browser:latest
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Etc/UTC}
      CHROME_CLI: "--remote-debugging-port=9222"
    volumes:
      - browser_data:/config
    # Chrome necesita /dev/shm grande o crashea cargando paginas con muchas
    # imagenes/iframes. 2GiB es el default que recomienda el image oficial.
    shm_size: 2g

volumes:
  agent01_data:
  agent01_logs:
  browser_data:
