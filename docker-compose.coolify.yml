# docker-compose.coolify.yml
#
# 4 services en un solo Resource de Coolify, uno por participante del taller.
# Coolify auto-detecta los ${VAR_AGENT0N} y los muestra como env vars vacios
# en la UI; vos los rellenas con los valores reales de cada participante.
#
# Convenciones:
#   - Globales (sin sufijo): viven en Coolify Project env, compartidas.
#   - Per-agent (con sufijo _AGENT0N): viven en el Resource env, una entrada
#     por participante. Los containers reciben los valores en el nombre
#     standard (sin sufijo) para que SDKs y skills no necesiten saber que
#     son "del agente N".
#   - El entrypoint renombra TELEGRAM_BOT_TOKEN -> TELEGRAM_BOT_TOKEN_AGENT0N
#     dentro del container (lo necesita compile.py para expandir el YAML).
#
# Volumes y networks: Coolify aisla todo este compose stack del resto de
# tu Coolify; los volumes `agent0N_*` solo ven a su propio service.

services:
  agent01:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AGENT_ID: agent01
      FLEET_REF: ${FLEET_REF:-main}
      FLEET_REPO_URL: ${FLEET_REPO_URL:-https://github.com/Nikoxx99/openclaw-fleet-config.git}
      OPENCLAW_GATEWAY_BIND: lan
      # per-agent (Resource env, sufijadas)
      OPENAI_API_KEY: ${OPENAI_API_KEY_AGENT01}
      GEMINI_API_KEY: ${GEMINI_API_KEY_AGENT01}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_AGENT01}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID_AGENT01}
      # globales (Project env)
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    volumes:
      - agent01_data:/home/node/.openclaw/workspace
      - agent01_logs:/var/log/agente
    ports:
      - "${PORT_AGENT01:-0}:18789"
    healthcheck:
      test: ["CMD", "/usr/local/bin/fleet-healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

